<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبد خرید</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazir', sans-serif; padding: 40px; background: #F7F7F9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .cart-total { margin-top: 20px; font-size: 1.2rem; font-weight: bold; text-align: left; }
        .btn-checkout { background: #10B981; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 20px; width: 100%; }
        .btn-remove { background: #EF4444; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>سبد خرید شما</h1>
        <div id="cartItems"></div>
        <div class="cart-total">
            جمع کل: <span id="totalPrice">0</span> تومان
        </div>
        <button class="btn-checkout" onclick="checkout()">تکمیل خرید و پرداخت</button>
        <br><br>
        <a href="/">ادامه خرید</a>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
