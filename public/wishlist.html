<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>علاقه‌مندی‌ها</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazir', sans-serif; padding: 40px; background: #F7F7F9; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; }
        #wishlistGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        /* استایل‌های مشابه محصولات */
        .product-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .product-card img { width: 100%; height: 200px; object-fit: contain; }
        .product-card h3 { font-size: 0.9rem; margin: 10px 0; }
        .remove-wish { position: absolute; top: 10px; left: 10px; color: red; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>لیست علاقه‌مندی‌های من</h1>
        <div id="wishlistGrid"></div>
        <br>
        <a href="/">بازگشت به صفحه اصلی</a>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderWishlist);
    </script>
</body>
</html>
