<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد کاربری | تک‌مارکت</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazir', sans-serif; background: #F7F7F9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #E2E8F0; padding-bottom: 20px; }
        .order-card { border: 1px solid #E2E8F0; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: #DBEAFE; color: #2563EB; }
        .status-paid { background: #D1FAE5; color: #059669; }
        .status-cancelled { background: #FEE2E2; color: #DC2626; }
        .btn-logout { background: #EF4444; color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="welcomeUser">خوش آمدید</h2>
            <a href="#" class="btn-logout" onclick="auth.logout()">خروج</a>
        </div>
        <h3>تاریخچه سفارشات</h3>
        <div id="userOrders">
            <!-- سفارشات اینجا لود می‌شوند -->
            <p>در حال بارگذاری...</p>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
